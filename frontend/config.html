<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget — Config</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { overflow-x: hidden; }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0;
    }

    /* ── HERO ──────────────────────────────────────────────── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.75rem 3rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.25;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 55%;
      background: radial-gradient(ellipse at 80% 50%, rgba(168,255,62,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease both;
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-eyebrow::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--muted);
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
    }

    .hero-salary-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hero-salary-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-salary-input {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 600;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
      padding: 0.3rem 0;
      width: 170px;
      outline: none;
      transition: border-color 0.2s;
    }

    .hero-salary-input:focus { border-color: var(--accent); }
    .hero-salary-input::placeholder { color: var(--muted); font-weight: 400; }

    /* ── CHART SIDE ─────────────────────────────────────────── */
    .chart-side {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 2.25rem;
      animation: fadeIn 0.6s 0.1s ease both;
    }

    .donut-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      flex-shrink: 0;
    }

    .donut-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .donut-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.1rem;
      pointer-events: none;
    }

    .donut-inner-lbl {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .donut-inner-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .donut-inner-n.over { color: var(--danger); }
    .donut-inner-n.ok   { color: var(--accent); }

    .donut-inner-sub {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
    }

    .legend-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-name {
      flex: 1;
      color: var(--muted);
      white-space: nowrap;
    }

    .legend-pct {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── SUM BAR ─────────────────────────────────────────────── */
    .sum-section {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 3rem;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.5s 0.15s ease both;
    }

    .sum-label {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .sum-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .sum-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent-dim);
      transition: width 0.3s ease, background 0.3s;
    }

    .sum-value {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 3rem;
      text-align: right;
    }

    .sum-value.over { color: var(--danger); }
    .sum-value.ok   { color: var(--accent); }

    /* ── SLIDERS ─────────────────────────────────────────────── */
    .sliders-section {
      padding: 2rem 3rem;
      flex: 1;
      overflow-y: auto;
      animation: fadeIn 0.5s 0.2s ease both;
    }

    .sliders-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .slider-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .slider-card:hover {
      border-color: #3a3a44;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .slider-stripe { height: 2px; }

    .slider-body {
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .slider-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .slider-name {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .slider-pct {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .slider-amount {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px currentColor;
      transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.25); }

    /* ── SAVE ────────────────────────────────────────────────── */
    .save-section {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 3rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .btn-save {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-save:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-reset {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      background: transparent;
      border: 1px solid rgba(168,255,62,0.25);
      border-radius: 6px;
      color: var(--muted);
      padding: 0.55rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    .toast {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      background: var(--danger);
      color: #fff;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.visible { opacity: 1; }

    .save-msg {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-msg.visible { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">BUDGET</span>
  <a href="dashboard.html">Dashboard</a>
  <a href="transactions.html">Lançamentos</a>
  <a href="investments.html">Investimentos</a>
  <a href="config.html" class="active">Config</a>
</nav>

<main>
  <!-- HERO -->
  <header class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">Distribuição de renda</div>
      <h1 class="hero-title">Controle de Orçamento</h1>
      <div class="hero-salary-row">
        <span class="hero-salary-label">Salário mensal</span>
        <input type="number" id="salary" class="hero-salary-input" placeholder="0,00" min="0" step="100" />
      </div>
    </div>

    <div class="chart-side">
      <div class="donut-wrap">
        <canvas id="donut"></canvas>
        <div class="donut-inner">
          <span class="donut-inner-lbl">Total</span>
          <span class="donut-inner-n" id="donutTotal">0%</span>
          <span class="donut-inner-sub">distribuído</span>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </header>

  <!-- SUM BAR -->
  <div class="sum-section">
    <span class="sum-label">Alocação</span>
    <div class="sum-bar-track">
      <div class="sum-bar-fill" id="sumBar" style="width:0%"></div>
    </div>
    <span class="sum-value" id="sumVal">0%</span>
  </div>

  <!-- SLIDERS -->
  <section class="sliders-section">
    <div class="sliders-grid" id="sliders"></div>
  </section>

  <!-- SAVE -->
  <div class="save-section">
    <button class="btn-save" id="btnSave">Salvar</button>
    <button class="btn-reset" id="btnReset">Resetar</button>
    <span class="toast" id="toast">Os baldes devem somar 100%</span>
    <span class="save-msg" id="saveMsg">✓ Salvo com sucesso</span>
  </div>
</main>

<script src="js/config.js"></script>
</body>
</html>
