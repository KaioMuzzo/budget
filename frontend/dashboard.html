<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow-x: hidden; }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0;
    }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 3rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.25;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 55%;
      background: radial-gradient(ellipse at 80% 50%, rgba(168,255,62,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease both;
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-eyebrow::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--muted);
    }

    .hero-month-nav {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .btn-arrow {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .btn-arrow:hover { border-color: var(--accent); color: var(--accent); }

    .hero-month {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
      min-width: 260px;
    }

    .hero-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .hero-sub strong { color: var(--text); font-weight: 600; }

    .hero-right {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.6rem;
      animation: fadeIn 0.6s 0.1s ease both;
    }

    .hero-balance-lbl {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-balance {
      font-family: var(--font-mono);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.04em;
      display: flex;
      align-items: baseline;
      gap: 0.15em;
    }

    .hero-currency { font-size: 1.4rem; color: var(--muted); font-weight: 400; letter-spacing: 0; }
    .hero-amount   { font-size: 3.6rem; color: var(--text); }
    .hero-cents    { font-size: 1.8rem; color: var(--muted); font-weight: 400; }

    /* ── STATS BAR ────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .stat-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 1.4rem 2rem;
      border-right: 1px solid var(--border);
      animation: fadeIn 0.5s ease both;
    }

    .stat-block:nth-child(1) { animation-delay: 0.08s; }
    .stat-block:nth-child(2) { animation-delay: 0.13s; }
    .stat-block:nth-child(3) { animation-delay: 0.18s; }
    .stat-block:nth-child(4) { animation-delay: 0.23s; }
    .stat-block:last-child { border-right: none; }

    .stat-lbl {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-val {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-val.income  { color: var(--income); }
    .stat-val.expense { color: var(--expense); }
    .stat-val.invest  { color: #fbbf24; }
    .stat-val.balance { color: var(--accent); }

    .stat-sub { font-size: 0.7rem; color: var(--muted); }
    .stat-sub.up   { color: var(--income); }
    .stat-sub.down { color: var(--expense); }

    /* ── CONTENT SECTION ─────────────────────────────────── */
    .content {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 1.75rem 2.5rem 2.5rem;
    }

    /* ── PANEL ────────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      animation: fadeIn 0.5s ease both;
    }

    .panel-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── CHART LEGEND ─────────────────────────────────────── */
    .chart-legend {
      display: flex;
      gap: 1.25rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── ROW LAYOUTS ──────────────────────────────────────── */
    .row { display: flex; gap: 1.25rem; }
    .col-2 { flex: 2; }
    .col-1 { flex: 1; }

    /* ── DONUT ────────────────────────────────────────────── */
    .donut-wrap {
      max-width: 300px;
      margin: 0 auto;
    }

    .donut-legend {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .donut-legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.76rem;
    }

    .legend-pip {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .donut-legend-name {
      flex: 1;
      color: var(--muted);
    }

    .donut-legend-bar-wrap {
      flex: 2;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .donut-legend-bar {
      height: 100%;
      border-radius: 99px;
    }

    .donut-legend-pct {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
      min-width: 2.5rem;
      text-align: right;
    }

    /* ── POCKETS LIST ─────────────────────────────────────── */
    .pockets-list {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .pocket-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }

    .pocket-row:last-child { border-bottom: none; }

    .pocket-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pocket-name {
      font-size: 0.82rem;
      font-weight: 600;
      flex: 1;
    }

    .pocket-bar-track {
      flex: 2;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .pocket-bar-fill {
      height: 100%;
      border-radius: 2px;
      opacity: 0.8;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .pocket-pct {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 32px;
      text-align: right;
    }

    .pocket-amount {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      min-width: 96px;
      text-align: right;
    }

    /* ── TRANSACTION TABLE ────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: left;
      padding: 0 0 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td { padding: 0.75rem 0; font-size: 0.82rem; }

    .tx-desc { font-weight: 600; }
    .tx-cat  { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      letter-spacing: 0.03em;
    }

    .badge.income  { background: rgba(56,189,248,0.12);  color: var(--income); }
    .badge.expense { background: rgba(244,114,182,0.12); color: var(--expense); }
    .badge.invest  { background: rgba(251,191,36,0.12);  color: #fbbf24; }

    .tx-amount {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      text-align: right;
    }

    .tx-amount.income  { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }
    .tx-amount.invest  { color: #fbbf24; }

    .tx-date {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">BUDGET</span>
  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="transactions.html">Lançamentos</a>
  <a href="investments.html">Investimentos</a>
  <a href="config.html">Config</a>
</nav>

<main>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <div class="hero">
    <div class="hero-left">
      <span class="hero-eyebrow">Resumo do mês</span>
      <div class="hero-month-nav">
        <button class="btn-arrow" id="btnPrev">&#8592;</button>
        <span class="hero-month" id="monthLabel">—</span>
        <button class="btn-arrow" id="btnNext">&#8594;</button>
      </div>
      <span class="hero-sub" id="heroSub">carregando...</span>
    </div>

    <div class="hero-right">
      <span class="hero-balance-lbl">Saldo do mês</span>
      <div class="hero-balance">
        <span class="hero-currency">R$</span>
        <span class="hero-amount" id="heroAmount">—</span>
        <span class="hero-cents" id="heroCents"></span>
      </div>
    </div>
  </div>

  <!-- ── STATS BAR ─────────────────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat-block">
      <span class="stat-lbl">Receita</span>
      <span class="stat-val income" id="cardIncome">—</span>
      <span class="stat-sub" id="cardIncomeSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Despesas</span>
      <span class="stat-val expense" id="cardExpense">—</span>
      <span class="stat-sub" id="cardExpenseSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Investido</span>
      <span class="stat-val invest" id="cardInvest">—</span>
      <span class="stat-sub" id="cardInvestSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Saldo</span>
      <span class="stat-val balance" id="cardBalance">—</span>
      <span class="stat-sub" id="cardBalanceSub"></span>
    </div>
  </div>

  <!-- ── CONTENT ────────────────────────────────────────────── -->
  <div class="content">

    <!-- Row 1: bar chart + donut -->
    <div class="row">

      <div class="panel col-2">
        <div class="panel-header">
          <span class="panel-title">Últimos 6 meses</span>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--income)"></div>Receita</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--expense)"></div>Despesa</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Investido</div>
          </div>
        </div>
        <canvas id="barChart" height="160"></canvas>
      </div>

      <div class="panel col-1">
        <span class="panel-title">Despesas por categoria</span>
        <div class="donut-wrap">
          <canvas id="donutChart" width="300" height="300"></canvas>
        </div>
        <div class="donut-legend" id="donutLegend"></div>
      </div>

    </div>

    <!-- Row 2: pockets + recent transactions -->
    <div class="row">

      <div class="panel col-1">
        <span class="panel-title">Alocação do salário</span>
        <div class="pockets-list" id="pocketsGrid"></div>
      </div>

      <div class="panel col-2">
        <span class="panel-title">Últimos lançamentos</span>
        <table>
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Tipo</th>
              <th style="text-align:right">Valor</th>
              <th style="text-align:right">Data</th>
            </tr>
          </thead>
          <tbody id="txBody"></tbody>
        </table>
      </div>

    </div>

  </div><!-- /content -->

</main>

<script src="js/dashboard.js"></script>
</body>
</html>
