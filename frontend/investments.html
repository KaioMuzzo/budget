<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget — Investimentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow-x: hidden; }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0;
    }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 3rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.25;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 55%;
      background: radial-gradient(ellipse at 80% 50%, rgba(251,191,36,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease both;
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-eyebrow::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--muted);
    }

    .hero-total {
      font-family: var(--font-mono);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      display: flex;
      align-items: baseline;
      gap: 0.15em;
    }

    .hero-currency {
      font-size: 1.6rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
    }

    .hero-amount {
      font-size: 4.2rem;
    }

    .hero-cents {
      font-size: 2rem;
      color: var(--muted);
      font-weight: 400;
    }

    .hero-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .hero-sub strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── DONUT + LEGEND ───────────────────────────────────── */
    .chart-side {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 2.25rem;
      animation: fadeIn 0.6s 0.1s ease both;
    }

    .donut-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      flex-shrink: 0;
    }

    .donut-wrap svg {
      width: 100%;
      height: 100%;
    }

    .donut-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.1rem;
    }

    .donut-inner-lbl {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .donut-inner-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }

    .donut-inner-sub {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
    }

    .legend-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-name {
      flex: 1;
      color: var(--muted);
      white-space: nowrap;
    }

    .legend-pct {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── STATS BAR ────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .stat-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 1.4rem 2rem;
      border-right: 1px solid var(--border);
      animation: fadeIn 0.5s ease both;
    }

    .stat-block:nth-child(1) { animation-delay: 0.08s; }
    .stat-block:nth-child(2) { animation-delay: 0.13s; }
    .stat-block:nth-child(3) { animation-delay: 0.18s; }
    .stat-block:nth-child(4) { animation-delay: 0.23s; }
    .stat-block:last-child { border-right: none; }

    .stat-lbl {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-val {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-val.green { color: #a8ff3e; }
    .stat-val.amber { color: #fbbf24; }
    .stat-val.blue  { color: #38bdf8; }

    .stat-sub {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── SECTION HEADER ───────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 2.5rem 1.25rem;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(168,255,62,0.3);
      border-radius: 6px;
      padding: 0.48rem 1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-new:hover {
      background: rgba(168,255,62,0.07);
      border-color: rgba(168,255,62,0.55);
    }

    /* ── CARDS GRID ───────────────────────────────────────── */
    .pockets-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
      padding: 0 2.5rem 2.5rem;
    }

    .pocket-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      animation: fadeIn 0.45s ease both;
      cursor: pointer;
    }

    .pocket-card:nth-child(1) { animation-delay: 0.08s; }
    .pocket-card:nth-child(2) { animation-delay: 0.13s; }
    .pocket-card:nth-child(3) { animation-delay: 0.18s; }
    .pocket-card:nth-child(4) { animation-delay: 0.23s; }
    .pocket-card:nth-child(5) { animation-delay: 0.28s; }
    .pocket-card:nth-child(6) { animation-delay: 0.33s; }

    .pocket-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px var(--card-glow, rgba(255,255,255,0.04));
      border-color: var(--card-border, var(--border));
    }

    .card-stripe {
      height: 3px;
    }

    .card-body {
      padding: 1.2rem 1.2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .card-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-name {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.2;
    }

    .card-badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .card-numbers {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-balance {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .card-delta {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    .card-delta.up   { color: #a8ff3e; }
    .card-delta.down { color: var(--danger); }

    .card-delta .delta-period {
      color: var(--muted);
      font-family: var(--font-display);
    }

    /* ── SPARKLINE ────────────────────────────────────────── */
    .sparkline {
      width: 100%;
      height: 46px;
      display: block;
      margin-top: 0.15rem;
    }

    /* ── CARD FOOTER ──────────────────────────────────────── */
    .card-footer {
      margin-top: 0.5rem;
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .alloc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .alloc-lbl {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .alloc-pct {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
    }

    .progress-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 1.2rem 1.2rem;
    }

    .btn-action {
      flex: 1;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.48rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
    }

    .btn-action:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
      background: var(--surface2);
    }

    .btn-action.deposit {
      color: #0d0d0f;
      border-color: transparent;
    }

    .btn-action.deposit:hover { opacity: 0.85; }

    /* ── OVERLAY + PANEL ──────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .overlay.open { opacity: 1; pointer-events: all; }

    .side-panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
    }

    .side-panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }

    .btn-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-close:hover { color: var(--text); border-color: var(--muted); }

    .panel-body {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
    }

    .panel-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .field { display: flex; flex-direction: column; gap: 0.5rem; }

    .field label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input {
      font-family: var(--font-display);
      font-size: 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-submit {
      width: 100%;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 6px;
      padding: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-submit:hover { opacity: 0.85; }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">BUDGET</span>
  <a href="dashboard.html">Dashboard</a>
  <a href="transactions.html">Lançamentos</a>
  <a href="investments.html" class="active">Investimentos</a>
  <a href="config.html">Config</a>
</nav>

<main>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <div class="hero">
    <div class="hero-left">
      <span class="hero-eyebrow">Total em caixinhas</span>
      <div class="hero-total">
        <span class="hero-currency">R$</span>
        <span class="hero-amount" id="heroAmount">—</span>
        <span class="hero-cents" id="heroCents"></span>
      </div>
      <span class="hero-sub" id="heroSub">carregando...</span>
    </div>

    <div class="chart-side">
      <!-- DONUT SVG -->
      <div class="donut-wrap">
        <svg id="donutSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <g transform="rotate(-90 100 100)"></g>
        </svg>
        <div class="donut-inner">
          <span class="donut-inner-lbl">carteiras</span>
          <span class="donut-inner-n" id="donutCount">—</span>
          <span class="donut-inner-sub">ativas</span>
        </div>
      </div>

      <!-- LEGEND -->
      <div class="legend" id="legendList"></div>
    </div>
  </div>

  <!-- ── STATS BAR ─────────────────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat-block">
      <span class="stat-lbl">Maior caixinha</span>
      <span class="stat-val" id="statMaior">—</span>
      <span class="stat-sub" id="statMaiorSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Menor caixinha</span>
      <span class="stat-val" id="statMenor">—</span>
      <span class="stat-sub" id="statMenorSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Caixinhas ativas</span>
      <span class="stat-val blue" id="statAtivas">—</span>
      <span class="stat-sub" id="statAtivaSub"></span>
    </div>
    <div class="stat-block">
      <span class="stat-lbl">Última movimentação</span>
      <span class="stat-val" id="statUltima">—</span>
      <span class="stat-sub" id="statUltimaSub"></span>
    </div>
  </div>

  <!-- ── POCKETS ────────────────────────────────────────────── -->
  <div class="section-header">
    <span class="section-title">Suas caixinhas</span>
    <button class="btn-new" id="btnNew">+ Nova caixinha</button>
  </div>

  <div class="pockets-grid" id="pocketsGrid"></div>
</main>

<!-- OVERLAY + PANEL (mantém estrutura funcional) -->
<div class="overlay" id="overlay"></div>

<div class="side-panel" id="panelBox">
  <div class="panel-header">
    <span class="panel-title">Nova Caixinha</span>
    <button class="btn-close" id="closeBox">✕</button>
  </div>
  <div class="panel-body">
    <div class="field">
      <label>Nome</label>
      <input type="text" id="fName" placeholder="Ex: Tesouro Direto, CDB..." />
    </div>

  <div class="panel-footer">
    <button class="btn-submit" id="btnSubmitBox">Criar</button>
  </div>
</div>

  <div class="panel-header">
    <span class="panel-title" id="panelTxTitle">Aportar</span>
    <button class="btn-close" id="closeTx">✕</button>
  </div>
  <div class="panel-body">
    <div class="field">
      <label>Valor (R$)</label>
      <input type="number" id="fTxAmount" placeholder="0,00" min="0.01" step="0.01" />
    </div>
    <div class="field">
      <label>Descrição</label>
      <input type="text" id="fTxDesc" placeholder="Ex: Aporte mensal..." />
    </div>
    <div class="field">
      <label>Data</label>
      <input type="date" id="fTxDate" />
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn-submit" id="btnSubmitTx">Confirmar</button>
  </div>
</div>

<script>
  const API     = 'http://localhost:3333/api'
  const PALETTE = ['#a8ff3e','#38bdf8','#f472b6','#fb923c','#a78bfa','#fbbf24']

  // ── HELPERS ──────────────────────────────────────────────────
  function fmtBRL(val) {
    return Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })
  }

  function hexRgb(hex) {
    return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`
  }

  function buildSparkSVG(spark, color, uid) {
    const nums = spark.map(Number)
    const min = Math.min(...nums)
    const max = Math.max(...nums)
    const range = max - min || 1
    const W = 120, H = 46, PAD = 4
    const pts = nums.map((v, i) => [
      ((i / (nums.length - 1)) * W).toFixed(1),
      (PAD + (1 - (v - min) / range) * (H - PAD * 2)).toFixed(1)
    ])
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ')
    const dFill = `${d} L${W},${H} L0,${H}Z`
    return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="sg${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
      <path d="${dFill}" fill="url(#sg${uid})"/>
    </svg>`
  }

  // ── RENDER ────────────────────────────────────────────────────
  function renderHero(boxes, last_movement) {
    const total = boxes.reduce((s, b) => s + parseFloat(b.balance), 0)
    const [intPart, decPart] = fmtBRL(total).split(',')
    document.getElementById('heroAmount').textContent = intPart
    document.getElementById('heroCents').textContent = ',' + decPart
    const count = boxes.length
    let sub = `<strong>${count} caixinha${count !== 1 ? 's' : ''}</strong> ativa${count !== 1 ? 's' : ''}`
    if (last_movement) sub += ` · última movimentação ${fmtDate(last_movement.date)}`
    document.getElementById('heroSub').innerHTML = sub
  }

  function renderDonut(boxes) {
    const total = boxes.reduce((s, b) => s + parseFloat(b.balance), 0)
    const CIRC = 440
    const g = document.querySelector('#donutSvg g')
    g.innerHTML = ''
    let offset = 0
    boxes.forEach((box, i) => {
      const color = PALETTE[i % PALETTE.length]
      const dash = total > 0 ? (parseFloat(box.balance) / total) * CIRC : 0
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
      circle.setAttribute('cx', '100')
      circle.setAttribute('cy', '100')
      circle.setAttribute('r', '70')
      circle.setAttribute('fill', 'none')
      circle.setAttribute('stroke', color)
      circle.setAttribute('stroke-width', '22')
      circle.setAttribute('stroke-dasharray', `${dash.toFixed(1)} ${CIRC}`)
      circle.setAttribute('stroke-dashoffset', offset === 0 ? '0' : `-${offset.toFixed(1)}`)
      g.appendChild(circle)
      offset += dash
    })
    document.getElementById('donutCount').textContent = boxes.length
  }

  function renderLegend(boxes) {
    const total = boxes.reduce((s, b) => s + parseFloat(b.balance), 0)
    document.getElementById('legendList').innerHTML = boxes.map((box, i) => {
      const color = PALETTE[i % PALETTE.length]
      const pct = total > 0 ? (parseFloat(box.balance) / total * 100).toFixed(1) : '0.0'
      return `<div class="legend-item">
        <span class="legend-pip" style="background:${color}"></span>
        <span class="legend-name">${box.name}</span>
        <span class="legend-pct">${pct}%</span>
      </div>`
    }).join('')
  }

  function renderStats(boxes, last_movement) {
    if (!boxes.length) return
    const total = boxes.reduce((s, b) => s + parseFloat(b.balance), 0)
    const sorted = [...boxes].sort((a, b) => parseFloat(b.balance) - parseFloat(a.balance))
    const maior = sorted[0]
    const menor = sorted[sorted.length - 1]
    const maiorPct = total > 0 ? (parseFloat(maior.balance) / total * 100).toFixed(1) : '0'
    const menorPct = total > 0 ? (parseFloat(menor.balance) / total * 100).toFixed(1) : '0'

    document.getElementById('statMaior').textContent = maior.name
    document.getElementById('statMaiorSub').textContent = `R$ ${fmtBRL(maior.balance)} · ${maiorPct}% do total`
    document.getElementById('statMenor').textContent = menor.name
    document.getElementById('statMenorSub').textContent = `R$ ${fmtBRL(menor.balance)} · ${menorPct}% do total`
    document.getElementById('statAtivas').textContent = boxes.length
    const zeradas = boxes.filter(b => parseFloat(b.balance) === 0).length
    document.getElementById('statAtivaSub').textContent = zeradas === 0 ? 'nenhuma zerada' : `${zeradas} zerada(s)`
    if (last_movement) {
      const label = last_movement.sub_type === 'DEPOSIT' ? 'Aporte' : 'Retirada'
      document.getElementById('statUltima').textContent = fmtDate(last_movement.date)
      document.getElementById('statUltimaSub').textContent = `${label} · ${last_movement.box_name} · R$ ${fmtBRL(last_movement.amount)}`
    } else {
      document.getElementById('statUltima').textContent = '—'
      document.getElementById('statUltimaSub').textContent = 'nenhuma movimentação'
    }
  }

  function renderCards(boxes) {
    const total = boxes.reduce((s, b) => s + parseFloat(b.balance), 0)
    document.getElementById('pocketsGrid').innerHTML = boxes.map((box, i) => {
      const color = PALETTE[i % PALETTE.length]
      const rgb = hexRgb(color)
      const pct = total > 0 ? (parseFloat(box.balance) / total * 100).toFixed(1) : '0.0'
      const hasMovement = parseFloat(box.delta.amount) > 0
      const arrow = box.delta.direction === 'up' ? '↑ +' : '↓ −'
      const deltaClass = box.delta.direction === 'up' ? 'up' : 'down'
      const deltaHtml = hasMovement
        ? `<div class="card-delta ${deltaClass}"><span>${arrow}R$ ${fmtBRL(box.delta.amount)}</span><span class="delta-period">este mês</span></div>`
        : `<div class="card-delta"><span class="delta-period" style="font-size:0.65rem">sem movimentação este mês</span></div>`

      return `<div class="pocket-card" style="--card-glow:rgba(${rgb},0.12);--card-border:rgba(${rgb},0.28)">
        <div class="card-stripe" style="background:${color}"></div>
        <div class="card-body">
          <div class="card-header-row">
            <span class="card-name">${box.name}</span>
            <span class="card-badge" style="color:${color};border-color:rgba(${rgb},0.28);background:rgba(${rgb},0.07)">${box.name}</span>
          </div>
          <div class="card-numbers">
            <span class="card-balance">R$ ${fmtBRL(box.balance)}</span>
            ${deltaHtml}
          </div>
          ${buildSparkSVG(box.spark, color, box.id)}
        </div>
        <div class="card-footer">
          <div class="alloc-row">
            <span class="alloc-lbl">Alocação</span>
            <span class="alloc-pct">${pct}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-action deposit" style="background:${color};color:#0d0d0f"
                  data-id="${box.id}" data-name="${box.name}" data-action="DEPOSIT">+ Aportar</button>
          <button class="btn-action"
                  data-id="${box.id}" data-name="${box.name}" data-action="WITHDRAWAL">− Retirar</button>
        </div>
      </div>`
    }).join('')

    document.querySelectorAll('#pocketsGrid [data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation()
        openTxPanel(btn.dataset.id, btn.dataset.name, btn.dataset.action)
      })
    })
  }

  // ── LOAD ──────────────────────────────────────────────────────
  async function load() {
    try {
      const res = await fetch(`${API}/investments`)
      const { boxes, last_movement } = await res.json()
      renderHero(boxes, last_movement)
      renderDonut(boxes)
      renderLegend(boxes)
      renderStats(boxes, last_movement)
      renderCards(boxes)
    } catch (e) {
      console.error('Erro ao carregar investimentos', e)
    }
  }

  // ── NOVA CAIXINHA ──────────────────────────────────────────────
  const overlay  = document.getElementById('overlay')
  const panelBox = document.getElementById('panelBox')
  const panelTx  = document.getElementById('panelTx')

  function closeAll() {
    panelBox.classList.remove('open')
    panelTx.classList.remove('open')
    overlay.classList.remove('open')
  }

  document.getElementById('btnNew').addEventListener('click', () => {
    document.getElementById('fName').value = ''
    panelBox.classList.add('open')
    overlay.classList.add('open')
  })

  document.getElementById('closeBox').addEventListener('click', closeAll)

  document.getElementById('btnSubmitBox').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim()
    if (!name) return
    try {
      const res = await fetch(`${API}/investments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      })
      if (!res.ok) throw new Error()
      closeAll()
      await load()
    } catch {
      alert('Erro ao criar caixinha.')
    }
  })

  // ── APORTAR / RETIRAR ──────────────────────────────────────────
  let currentBoxId   = null
  let currentSubType = null

  function openTxPanel(boxId, boxName, subType) {
    currentBoxId   = Number(boxId)
    currentSubType = subType
    const label = subType === 'DEPOSIT' ? 'Aportar' : 'Retirar'
    document.getElementById('panelTxTitle').textContent = `${label} · ${boxName}`
    document.getElementById('btnSubmitTx').textContent  = subType === 'DEPOSIT' ? 'Confirmar Aporte' : 'Confirmar Retirada'
    document.getElementById('fTxAmount').value = ''
    document.getElementById('fTxDesc').value   = ''
    document.getElementById('fTxDate').value   = new Date().toISOString().slice(0, 10)
    panelTx.classList.add('open')
    overlay.classList.add('open')
  }

  document.getElementById('closeTx').addEventListener('click', closeAll)

  document.getElementById('btnSubmitTx').addEventListener('click', async () => {
    const amount      = parseFloat(document.getElementById('fTxAmount').value)
    const description = document.getElementById('fTxDesc').value.trim()
    const date        = document.getElementById('fTxDate').value
    if (!amount || amount <= 0 || !description || !date) return
    try {
      const res = await fetch(`${API}/transactions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description, amount, type: 'INVESTMENT', sub_type: currentSubType, date, box_id: currentBoxId })
      })
      if (!res.ok) throw new Error()
      closeAll()
      await load()
    } catch {
      alert('Erro ao registrar movimentação.')
    }
  })

  overlay.addEventListener('click', closeAll)

  load()
</script>
</body>
</html>
